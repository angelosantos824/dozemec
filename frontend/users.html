<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuários | DOZEMEC</title>
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar"><div class="brand"><strong>DOZEMEC</strong><h1>Usuários</h1></div><button class="secondary" id="logoutButton">Sair</button></header>
      <nav class="nav" id="mainNav"></nav>
      <section class="panel stack">
        <div class="toolbar">
          <input id="search" placeholder="Pesquisar">
          <select id="status"><option value="">Todos</option><option value="active">Ativos</option><option value="inactive">Inativos</option><option value="blocked">Bloqueados</option></select>
          <button id="loadButton">Filtrar</button>
        </div>
        <form id="userForm" class="grid">
          <input type="hidden" name="id">
          <label>Nome<input name="name" required></label>
          <label>E-mail<input name="email" type="email" required></label>
          <label>Username<input name="username"></label>
          <label>Telefone<input name="phone"></label>
          <label>Setor<select name="sectorId"></select></label>
          <label>Perfil<select name="roleId"></select></label>
          <label>Status<select name="status"><option value="active">active</option><option value="inactive">inactive</option><option value="blocked">blocked</option></select></label>
          <label>Senha temporária<input name="password" type="password"></label>
          <div class="actions"><button type="submit">Salvar</button><button type="button" class="secondary" id="clearButton">Limpar</button></div>
        </form>
        <div id="usersTable"></div>
        <div id="historyPanel"></div>
        <p class="message" id="pageMessage"></p>
      </section>
    </main>
    <script src="js/api/client.js"></script><script src="js/auth/session.js"></script><script src="js/modules/navigation.js"></script><script src="js/modules/tableUtils.js"></script><script src="js/modules/users.js"></script>
  </body>
</html>
